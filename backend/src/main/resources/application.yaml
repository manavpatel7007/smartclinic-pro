# ── Server ──────────────────────────────────────────────────────
server:
  port: 8080

# ── Application ─────────────────────────────────────────────────
spring:
  application:
    name: smartclinic-backend

  # ── PostgreSQL ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/smartclinic
    username: smartclinic_user
    password: smartclinic_pass
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ─────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway ───────────────────────────────────────────────────
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ── Redis ────────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379

# ── Logging ──────────────────────────────────────────────────────
logging:
  level:
    com.smartclinic: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: INFO